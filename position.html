<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .down{
            position: static;
            border: 1px solid black;
        }

        .vhalu{ 
            position: static;
            border: 1px solid black;
            left: 50px;
            top: 20px;

        }
        .lion{
            position: sticky;
            top: 1px;
        }

        .dummy{
            border: 1px solid black;
            height: 100px;
        }
    </style>
</head>
<body>
    <h3>
    my name is John Doe
    </h3>
    <ol>
        <!-- flow related -->
        <li>static</li>
        <li>relative</li><!-- it does not left its orginal position bt moves around -->
        <li>absolute</li><!-- it losses its position and movwes relivent to its parent or the root of the website-->
        <!--scroll-->
        <li>fixed</li><!--  it makes the div stay to one place even when scrolled down. it doesn't change if the div/container is end like sticky  -->
        <li>sticky</li> <!--  it makes the div stick to one place even when scrolled down remember it only works in same container/div, after that it wont stay on that position. -->
    </ol>

    <div class="swim"> <!-- .box*3>img (shortcut for box div creation) -->
        <div class="box down"><img src="asset/download.png" alt=""></div>
        <div class="box vhalu"><img src="asset/vhLU.png" alt=""></div>
        <div class="box lion"><img src="asset/lion.jpg" alt=""></div>

        <div class="dummy">hi</div>

        <div class="dummy"></div>
    </div>
</body>
</html>
